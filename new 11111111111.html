<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Τζεο Online Chat</title>

<style>
body{
margin:0;
font-family:system-ui;
background:#0b1220;
color:white;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:700px;
padding:20px;
}

h1{
text-align:center;
}

input,button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
}

input{
background:#111827;
color:white;
}

button{
background:#3b82f6;
color:white;
cursor:pointer;
}

.msg{
background:#111827;
padding:10px;
margin-top:10px;
border-radius:10px;
}

small{
color:#94a3b8;
}
</style>
</head>

<body>

<div class="container">

<h1>💬 Τζεο Online Chat</h1>

<input id="name" placeholder="Όνομα">
<input id="text" placeholder="Γράψε μήνυμα">
<button onclick="send()">Send</button>

<div id="chat"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
getFirestore,
collection,
addDoc,
onSnapshot,
query,
orderBy,
serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "YOUR_KEY",
authDomain: "YOUR_DOMAIN",
projectId: "YOUR_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* REAL TIME LISTENER */
const q = query(collection(db,"messages"),orderBy("time"));

onSnapshot(q,(snap)=>{

document.getElementById("chat").innerHTML="";

snap.forEach(doc=>{
let d = doc.data();

document.getElementById("chat").innerHTML += `
<div class="msg">
<b>${d.name}</b><br>
${d.text}<br>
<small>${new Date(d.time?.seconds*1000).toLocaleString()}</small>
</div>
`;
});

});

/* SEND MESSAGE */
window.send = async function(){

let name = document.getElementById("name").value || "Anon";
let text = document.getElementById("text").value;

if(!text) return;

await addDoc(collection(db,"messages"),{
name,
text,
time:serverTimestamp()
});

document.getElementById("text").value="";
}

</script>

</body>
</html>
